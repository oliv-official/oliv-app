<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Oliv | Categories</title>
    <!-- @include head -->
    <link rel="stylesheet" href="/static/css/categories.css">
</head>
<body>
    <!-- @include chrome -->

    <div class="body_container">
        <!-- @include sidebar -->

        <div class="page">

<div class="cat-page">
    <div class="cat-page-header">
        <div>
            <h1 class="page-title">Categories<span class="fc-info" tabindex="0" role="note"
                aria-label="Categories group your transactions and appear as rows in your Cash Flow statement. Drag a category by its handle to reorder it — the order here sets the row order on the Cash Flow page. Fixed: consistent recurring costs like rent or subscriptions. Flex: variable day-to-day spending like groceries or dining. Goal: a targeted amount to reach, like a vacation fund. Deletion is blocked when transactions or stored values still reference a category — reassign first."
                data-tip="Categories group your transactions and appear as rows in your Cash Flow statement. Drag a category by its handle to reorder it — the order here sets the row order on the Cash Flow page.&#10;&#10;Fixed — consistent recurring costs (rent, subscriptions). Flex — variable day-to-day spending (groceries, dining). Goal — a targeted amount to reach (vacation fund, new laptop).&#10;&#10;Deletion is blocked when transactions or stored values still reference a category — reassign first.">i</span></h1>
        </div>
    </div>

    <!-- The whole editor — a search field above collapsible group cards
         (Income · Expense · Savings · Investing), each with its rows and an
         "Add category" footer — is rendered by
         static/js/shell/settingsCategories.js into [data-categories-editor]. -->
    <div class="cat-page-editor" data-categories-editor></div>
</div>
        </div>
    </div>

    <!-- @include scripts -->
