<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Oliv | Budget</title>
    <!-- @include head -->
    <link rel="stylesheet" href="/static/css/budget.css">
</head>
<body>
    <!-- @include chrome -->

    <div class="body_container">
        <!-- @include sidebar -->

        <div class="page">

<div class="budget-page">

    <header class="budget-header">
        <div class="budget-header-text">
            <h1 class="page-title">Budgets</h1>
            <p class="page-subtitle">
                One standing target per category, applied to every month. Watch
                each envelope fill from this month’s spending.
            </p>
        </div>
        <div class="budget-toolbar">
            <div class="budget-monthnav">
                <button type="button" class="budget-nav-btn" id="budget-prev" aria-label="Previous month">‹</button>
                <span class="budget-month-label" id="budget-month-label">—</span>
                <button type="button" class="budget-nav-btn" id="budget-next" aria-label="Next month">›</button>
            </div>
            <p class="budget-income" id="budget-income" aria-live="polite"></p>
        </div>
    </header>

    <!-- Envelope grids grouped by category type, rendered by budget.js -->
    <div class="budget-groups" id="budget-groups"></div>

</div>

        </div>
    </div>

    <!-- @include scripts -->
    <script src="/static/js/pages/budget.js"></script>
</body>
</html>
