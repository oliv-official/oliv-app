<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Oliv | Transactions</title>
    <!-- @include head -->
    <link rel="stylesheet" href="/static/css/tables.css">
    <link rel="stylesheet" href="/static/css/transactions.css">
</head>
<body>
    <!-- @include chrome -->

    <div class="body_container">
        <!-- @include sidebar -->

        <div class="page">
             
<div class="db-page tx-page">
    <div class="db-page-header">
        <div>
            <h1 class="page-title">Transactions</h1>
            <p class="page-subtitle">Add, edit, and categorize your transactions.</p>
        </div>
    </div>

    <!-- Chip row above the table — no container background. The left group is
         one filter chip per search field (Date / Name / Amount / Type /
         Category) plus a Clear all; the right group holds the action chips
         (Edit / Delete / Import / Export / Add). Inactive filter chips read as a
         dotted outline with just the field name; clicking one drops a popover of
         options, and once a value is picked the chip fills with the primary
         accent and reads "Field : value" with a leading × to clear it. The
         option popovers are built on demand in transactions.js. -->
    <div class="tx-chips">
        <div class="tx-chips-group tx-chips-left" id="tx-filter-chips">
            <div class="tx-filter-chip" data-filter="date">
                <button class="tx-filter-clear" type="button" aria-label="Clear date filter">
                    <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                </button>
                <button class="tx-filter-main" type="button" aria-haspopup="dialog" aria-expanded="false" aria-label="Filter by Date">
                    <span class="tx-filter-name">Date</span><span class="tx-filter-rule" aria-hidden="true"></span><span class="tx-filter-value"></span>
                </button>
            </div>
            <div class="tx-filter-chip" data-filter="name">
                <button class="tx-filter-clear" type="button" aria-label="Clear name filter">
                    <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                </button>
                <button class="tx-filter-main" type="button" aria-haspopup="dialog" aria-expanded="false" aria-label="Filter by Name">
                    <span class="tx-filter-name">Name</span><span class="tx-filter-rule" aria-hidden="true"></span><span class="tx-filter-value"></span>
                </button>
            </div>
            <div class="tx-filter-chip" data-filter="amount">
                <button class="tx-filter-clear" type="button" aria-label="Clear amount filter">
                    <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                </button>
                <button class="tx-filter-main" type="button" aria-haspopup="dialog" aria-expanded="false" aria-label="Filter by Amount">
                    <span class="tx-filter-name">Amount</span><span class="tx-filter-rule" aria-hidden="true"></span><span class="tx-filter-value"></span>
                </button>
            </div>
            <div class="tx-filter-chip" data-filter="type">
                <button class="tx-filter-clear" type="button" aria-label="Clear type filter">
                    <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                </button>
                <button class="tx-filter-main" type="button" aria-haspopup="dialog" aria-expanded="false" aria-label="Filter by Type">
                    <span class="tx-filter-name">Type</span><span class="tx-filter-rule" aria-hidden="true"></span><span class="tx-filter-value"></span>
                </button>
            </div>
            <div class="tx-filter-chip" data-filter="category">
                <button class="tx-filter-clear" type="button" aria-label="Clear category filter">
                    <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                </button>
                <button class="tx-filter-main" type="button" aria-haspopup="dialog" aria-expanded="false" aria-label="Filter by Category">
                    <span class="tx-filter-name">Category</span><span class="tx-filter-rule" aria-hidden="true"></span><span class="tx-filter-value"></span>
                </button>
            </div>
            <button class="tx-clear-all" type="button" id="tx-clear-all" hidden>Clear all</button>
        </div>
        <div class="tx-chips-group tx-chips-right">
            <!-- Selection-driven action chips: disabled until at least one row
                 is checked; the live count rides in the aria-label / tooltip
                 now that these are icon-only. -->
            <button class="tx-chip tx-chip-icon tx-edit-btn" type="button" disabled aria-label="Edit" title="Edit">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M14.5 3.5l2 2-9.5 9.5-3 1 1-3 9.5-9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="tx-chip tx-chip-icon tx-delete-btn" type="button" disabled aria-label="Delete" title="Delete">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M4 6h12M8 6V4h4v2M6 6l1 10h6l1-10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="tx-chip tx-chip-icon tx-import-btn" type="button" aria-label="Import transactions" title="Import">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M10 14V4M6 8l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 17h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="tx-chip tx-chip-icon tx-export-btn" type="button" aria-label="Export transactions" title="Export">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M10 4v10M6 10l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 17h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="tx-chip tx-chip-icon tx-add-btn" type="button" aria-label="Add transaction" title="Add transaction">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="tx-wrapper">
        <table class="tx-table">
            <thead>
                <tr class="tx-header-row">
                    <th class="tx-col-select"><input type="checkbox" id="tx-select-all" class="tx-checkbox" aria-label="Select all transactions"></th>
                    <th class="tx-col-date">Date</th>
                    <th class="tx-col-description">Description</th>
                    <th class="tx-col-type">Type</th>
                    <th class="tx-col-category">Category</th>
                    <th class="tx-col-amount">Amount</th>
                    <th class="tx-col-notes">Notes</th>
                </tr>
            </thead>
            <tbody id="tx-tbody"></tbody>
            <!-- Pagination row — client-side, 100 rows per page over the filtered
                 rows. The whole footer row is hidden by JS whenever everything
                 fits on a single page. -->
            <tfoot>
                <tr class="tx-footer-row" id="tx-footer-row" hidden>
                    <td colspan="7">
                        <div class="tx-pagination" id="tx-pagination"></div>
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>
        </div>
    </div>

    <!-- @include scripts -->
    <script src="/static/js/widgets/txfileimport.js"></script>
    <script src="/static/js/widgets/txexport.js"></script>
    <script src="/static/js/pages/transactions.js"></script>
</body>
</html>
