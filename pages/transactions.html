<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Oliv | Transactions</title>
    <!-- @include head -->
    <link rel="stylesheet" href="/static/css/tables.css">
    <link rel="stylesheet" href="/static/css/transactions.css">
</head>
<body>
    <!-- @include chrome -->

    <div class="body_container">
        <!-- @include sidebar -->

        <div class="page">
             
<div class="db-page tx-page">
    <div class="db-page-header">
        <div>
            <h1 class="page-title">Transactions</h1>
            <p class="page-subtitle">Add, edit, and categorize your transactions.</p>
        </div>
    </div>

    <!-- Chip row above the table — no container background. The left group
         holds quick-filter pills (rounded); the right group holds the action
         chips (Edit / Delete / Import / Export / Add) and the search trigger,
         all as rounded squares, aligned right. -->
    <div class="tx-chips">
        <div class="tx-chips-group tx-chips-left">
            <!-- Quick-filter pills — shortcuts onto the same filter state the
                 search popover writes, so they highlight in lockstep with it.
                 The four type pills are mutually exclusive (one tx_type);
                 Uncategorized is an independent category filter. -->
            <button class="tx-chip tx-quick tx-quick-uncat" type="button" data-quick="category" data-value="none" aria-pressed="false">Uncategorized</button>
            <button class="tx-chip tx-quick" type="button" data-quick="type" data-value="income" aria-pressed="false">Income</button>
            <button class="tx-chip tx-quick" type="button" data-quick="type" data-value="expense" aria-pressed="false">Expense</button>
            <button class="tx-chip tx-quick" type="button" data-quick="type" data-value="savings" aria-pressed="false">Savings</button>
            <button class="tx-chip tx-quick" type="button" data-quick="type" data-value="investing" aria-pressed="false">Investing</button>
        </div>
        <div class="tx-chips-group tx-chips-right">
            <!-- Selection-driven action chips: disabled until at least one row
                 is checked; the live count rides in the aria-label / tooltip
                 now that these are icon-only. -->
            <button class="tx-chip tx-chip-icon tx-edit-btn" type="button" disabled aria-label="Edit" title="Edit">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M14.5 3.5l2 2-9.5 9.5-3 1 1-3 9.5-9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="tx-chip tx-chip-icon tx-delete-btn" type="button" disabled aria-label="Delete" title="Delete">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M4 6h12M8 6V4h4v2M6 6l1 10h6l1-10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="tx-chip tx-chip-icon tx-import-btn" type="button" aria-label="Import transactions" title="Import">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M10 14V4M6 8l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 17h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="tx-chip tx-chip-icon tx-export-btn" type="button" aria-label="Export transactions" title="Export">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M10 4v10M6 10l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 17h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="tx-chip tx-chip-icon tx-add-btn" type="button" aria-label="Add transaction" title="Add transaction">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="tx-search-popover-wrap">
                <button class="tx-chip tx-chip-icon tx-search-toggle" type="button" id="tx-search-toggle"
                        aria-label="Search transactions" aria-haspopup="dialog" aria-expanded="false">
                    <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                        <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M13.2 13.2 16.5 16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>

                <!-- Search popover — every filled-in filter narrows the table
                     below in real time. Anchored under the magnifying chip. -->
                <div class="tx-search-popover" id="tx-search-popover" role="dialog" aria-label="Search transactions" hidden>
                    <div class="tx-search-field">
                        <span class="tx-search-label">Date</span>
                        <div class="tx-search-range">
                            <input type="date" class="tx-input tx-search-date" id="tx-search-date-from" aria-label="From date">
                            <span class="tx-search-range-sep">&ndash;</span>
                            <input type="date" class="tx-input tx-search-date" id="tx-search-date-to" aria-label="To date">
                        </div>
                    </div>
                    <div class="tx-search-field tx-search-field-name">
                        <span class="tx-search-label">Name</span>
                        <input type="text" class="tx-input" id="tx-search-name" placeholder="Search descriptions" spellcheck="false" autocomplete="off">
                    </div>
                    <div class="tx-search-field">
                        <span class="tx-search-label">Amount</span>
                        <div class="tx-search-range">
                            <input type="text" inputmode="decimal" class="tx-input tx-input-amount tx-search-amount" id="tx-search-amount-min" placeholder="Min" aria-label="Minimum amount" autocomplete="off">
                            <span class="tx-search-range-sep">&ndash;</span>
                            <input type="text" inputmode="decimal" class="tx-input tx-input-amount tx-search-amount" id="tx-search-amount-max" placeholder="Max" aria-label="Maximum amount" autocomplete="off">
                        </div>
                    </div>
                    <div class="tx-search-field">
                        <span class="tx-search-label">Type</span>
                        <select class="tx-select" id="tx-search-type">
                            <option value="">All</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                            <option value="savings">Savings</option>
                            <option value="investing">Investing</option>
                        </select>
                    </div>
                    <div class="tx-search-field">
                        <span class="tx-search-label">Category</span>
                        <select class="tx-select" id="tx-search-category">
                            <option value="">All</option>
                        </select>
                    </div>
                    <div class="tx-search-actions">
                        <button class="button-secondary" type="button" id="tx-search-clear">Clear all</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="tx-wrapper">
        <table class="tx-table">
            <thead>
                <tr class="tx-header-row">
                    <th class="tx-col-select"><input type="checkbox" id="tx-select-all" class="tx-checkbox" aria-label="Select all transactions"></th>
                    <th class="tx-col-date">Date</th>
                    <th class="tx-col-description">Description</th>
                    <th class="tx-col-type">Type</th>
                    <th class="tx-col-category">Category</th>
                    <th class="tx-col-amount">Amount</th>
                    <th class="tx-col-notes">Notes</th>
                </tr>
            </thead>
            <tbody id="tx-tbody"></tbody>
            <!-- Pagination row — client-side, 100 rows per page over the filtered
                 rows. The whole footer row is hidden by JS whenever everything
                 fits on a single page. -->
            <tfoot>
                <tr class="tx-footer-row" id="tx-footer-row" hidden>
                    <td colspan="7">
                        <div class="tx-pagination" id="tx-pagination"></div>
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>
        </div>
    </div>

    <!-- @include scripts -->
    <script src="/static/js/txfileimport.js"></script>
    <script src="/static/js/txexport.js"></script>
    <script src="/static/js/transactions.js"></script>
</body>
</html>
