<div class="db-modal-overlay" id="db-modal" hidden>
    <div class="db-modal">
        <div class="db-modal-header">
            <span class="db-modal-title" id="db-modal-title">New Database</span>
            <button class="db-modal-close" id="db-modal-close" aria-label="Close">&times;</button>
        </div>
        <div class="db-modal-body">
            <p class="db-modal-hint" id="db-modal-hint" hidden></p>
            <label class="db-field" id="db-path-row">
                <span>File location</span>
                <span class="db-path-inputs">
                    <input type="text" id="db-path-input" placeholder="e.g. ~/Documents/finance.db" spellcheck="false" autocomplete="off">
                    <button type="button" class="db-btn" id="db-browse-btn">Browse…</button>
                </span>
            </label>
            
            <div class="db-browser" id="db-browser" hidden>
                <div class="db-browser-path" id="db-browser-path"></div>
                <ul class="db-browser-list" id="db-browser-list"></ul>
            </div>
            <label class="db-check" id="db-encrypt-row">
                <input type="checkbox" id="db-encrypt-check">
                <span>Encrypt this database with a password</span>
            </label>
            <label class="db-field" id="db-password-row" hidden>
                <span id="db-password-label">Password</span>
                <input type="password" id="db-password-input" autocomplete="new-password">
            </label>
            <label class="db-field" id="db-confirm-row" hidden>
                <span>Confirm password</span>
                <input type="password" id="db-confirm-input" autocomplete="new-password">
            </label>
            <p class="db-modal-error" id="db-modal-error" hidden></p>
        </div>
        <div class="db-modal-actions">
            <button type="button" class="db-btn db-btn-link" id="db-switch-open-btn" hidden>Open a different database…</button>
            <span class="db-modal-actions-spacer"></span>
            <button type="button" class="db-btn" id="db-cancel-btn">Cancel</button>
            <button type="button" class="db-btn db-btn-primary" id="db-submit-btn">Create</button>
        </div>
    </div>
</div>
