     Spliced into pages/*.html by the app:// protocol handler (electron/main.js)
     at the <!~~ @include head ~~> marker. Page-specific <title> and CSS live in
     the page files (title before this include, CSS after, matching the old
     Jinja block order). -->

    <script src="/static/js/theme-init.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/themes.css">
